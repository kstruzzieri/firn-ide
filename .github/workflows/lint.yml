name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend (required for go:embed)
        run: |
          cd frontend
          npm run build

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned (with .golangci.yml version "2") so CI and the local
          # .husky/pre-push hook run identical checks.
          version: v2.11.4
          # Skip the action's remote JSON-schema fetch for config validation:
          # that network call to golangci-lint.run times out intermittently and
          # fails otherwise-green runs. golangci-lint still errors on a genuinely
          # broken config at runtime.
          verify: false
