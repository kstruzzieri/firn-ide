name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: wails build -platform "darwin/${BUILD_ARCH}"

      - name: Package application
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          cd build/bin
          zip -r "Arc-macos-${BUILD_ARCH}.zip" Arc.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arc-macos-${{ matrix.arch }}
          path: build/bin/Arc-macos-${{ matrix.arch }}.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Linux dependencies for Wails
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build application
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Package application
        run: |
          cd build/bin
          tar -czvf Arc-linux-amd64.tar.gz arc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arc-linux-amd64
          path: build/bin/Arc-linux-amd64.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi

          # Write to file for the release body
          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
