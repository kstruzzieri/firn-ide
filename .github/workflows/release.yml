name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: wails build -platform "darwin/${BUILD_ARCH}"

      - name: Package application
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          cd build/bin
          zip -r "Firn-macos-${BUILD_ARCH}.zip" Firn.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firn-macos-${{ matrix.arch }}
          path: build/bin/Firn-macos-${{ matrix.arch }}.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Linux dependencies for Wails
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build application
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Package application
        run: |
          cd build/bin
          tar -czvf Firn-linux-amd64.tar.gz firn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firn-linux-amd64
          path: build/bin/Firn-linux-amd64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        run: wails build -platform windows/amd64

      - name: Package application
        run: Compress-Archive -Path build/bin/firn.exe -DestinationPath build/bin/Firn-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firn-windows-amd64
          path: build/bin/Firn-windows-amd64.zip

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: sh .github/scripts/extract-changelog.sh "$GITHUB_REF_NAME" CHANGELOG.md changelog.md frontend/package.json

      - name: Generate checksums
        run: sh .github/scripts/generate-checksums.sh artifacts SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            SHA256SUMS
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          # Tags with a pre-release suffix (e.g. v0.11.0-rc.1) publish as a
          # prerelease so the build matrix can be dry-run before the real tag.
          prerelease: ${{ contains(github.ref_name, '-') }}
