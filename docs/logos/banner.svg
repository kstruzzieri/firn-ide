<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <!-- Background per spec -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="50%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>

    <!-- Primary gradient: blue to cyan -->
    <linearGradient id="arcPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="arcSecondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <!-- Spark gradient -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="mainGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#0EA5E9" flood-opacity="0.35"/>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#0EA5E9" flood-opacity="0.25"/>
    </filter>

    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  <rect width="1280" height="640" fill="url(#ambientGlow)"/>

  <!-- Main content group - centered -->
  <g transform="translate(640, 280)">

    <!-- "A" letter -->
    <text x="-230" y="25"
          font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="130"
          font-weight="600"
          letter-spacing="8"
          fill="url(#arcPrimary)"
          filter="url(#textGlow)">A</text>

    <!-- "R" letter -->
    <text x="-120" y="25"
          font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="130"
          font-weight="600"
          letter-spacing="8"
          fill="url(#arcPrimary)"
          filter="url(#textGlow)">R</text>

    <!-- Logo icon as the "C" -->
    <g transform="translate(42, -25) scale(1)">
      <!-- Outer flow arc - forms the C shape -->
      <path d="M-4 -60 Q66 -60 66 8 Q66 72 -4 72"
            fill="none"
            stroke="url(#arcPrimary)"
            stroke-width="12"
            stroke-linecap="round"
            filter="url(#mainGlow)"/>

      <!-- Inner arc - bracket shape -->
      <path d="M6 -40 Q-46 -40 -46 8 Q-46 52 6 52"
            fill="none"
            stroke="url(#arcSecondary)"
            stroke-width="11"
            stroke-linecap="round"
            filter="url(#mainGlow)"/>

      <!-- Central node -->
      <circle cx="6" cy="6" r="20" fill="url(#arcPrimary)" filter="url(#mainGlow)"/>
      <circle cx="6" cy="6" r="10" fill="#F0F6FC"/>

      <!-- Energy spark at terminus -->
      <circle cx="-4" cy="72" r="7" fill="url(#sparkGrad)" filter="url(#sparkGlow)"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="640" y="410"
        text-anchor="middle"
        font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="5"
        fill="#8B949E"
        filter="url(#subtleGlow)">
    LIGHTWEIGHT IDE, HEAVYWEIGHT FOCUS
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 500)" font-family="'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="13" font-weight="500">
    <g transform="translate(-280, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#38BDF8" letter-spacing="1">AI INTEGRATED</text>
    </g>
    <g transform="translate(-95, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#38BDF8" letter-spacing="1">WORKSPACES</text>
    </g>
    <g transform="translate(95, 0)">
      <rect x="-65" y="-16" width="130" height="32" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#38BDF8" letter-spacing="1">RUN PROFILES</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text text-anchor="middle" y="5" fill="#38BDF8" letter-spacing="1">LIGHTWEIGHT</text>
    </g>
  </g>

  <!-- Tech stack -->
  <g transform="translate(640, 560)">
    <text text-anchor="middle"
          font-family="'SF Mono', 'JetBrains Mono', monospace"
          font-size="11"
          fill="#484F58"
          letter-spacing="1">
      WAILS + REACT + GO
    </text>
  </g>
</svg>
