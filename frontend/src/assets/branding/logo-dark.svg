<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 150">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>

    <!-- Primary gradient: blue to cyan -->
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <!-- Spark gradient -->
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0EA5E9" flood-opacity="0.25"/>
    </filter>

    <!-- Spark glow -->
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="380" height="150" rx="16" fill="url(#bgGrad)"/>
  <rect width="380" height="150" rx="16" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- "A" letter -->
  <text x="50" y="88"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="60"
        font-weight="600"
        letter-spacing="12"
        fill="url(#arcGradient)"
        filter="url(#shadow)">A</text>

  <!-- "R" letter -->
  <text x="106" y="88"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="60"
        font-weight="600"
        letter-spacing="12"
        fill="url(#arcGradient)"
        filter="url(#shadow)">R</text>

  <!-- Logo icon as the "C" -->
  <g transform="translate(186, 64) scale(0.48)">
    <!-- Outer flow arc - forms the C shape -->
    <path d="M-4 -60 Q66 -60 66 8 Q66 72 -4 72"
          fill="none"
          stroke="url(#arcGradient)"
          stroke-width="12"
          stroke-linecap="round"
          filter="url(#glow)"/>

    <!-- Inner arc - deep C curve matching banner -->
    <path d="M6 -40 Q-46 -40 -46 8 Q-46 52 6 52"
          fill="none"
          stroke="url(#accentGradient)"
          stroke-width="11"
          stroke-linecap="round"
          filter="url(#glow)"/>

    <!-- Central energy node -->
    <circle cx="6" cy="6" r="20" fill="url(#arcGradient)" filter="url(#glow)"/>
    <circle cx="6" cy="6" r="10" fill="#F0F6FC"/>

    <!-- Energy spark at arc terminus -->
    <circle cx="-4" cy="72" r="7" fill="url(#sparkGradient)" filter="url(#sparkGlow)"/>
  </g>

  <!-- Tagline -->
  <text x="53" y="125"
        font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="2"
        fill="#6E7681">
    LIGHTWEIGHT IDE, HEAVYWEIGHT FOCUS
  </text>
</svg>
