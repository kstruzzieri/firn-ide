<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Firn: Right-aligned stacked compression bars with snowflake -->
  <!-- Snow accumulates → compacts into firn → glacial ice -->

  <!-- Snowflake — centered above top bar -->
  <g transform="translate(70, 18)" fill="none" stroke="#FFFFFF" stroke-width="1.2">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-6.93" y1="-4" x2="6.93" y2="4"/>
    <line x1="-6.93" y1="4" x2="6.93" y2="-4"/>
    <line x1="0" y1="-5" x2="-2.5" y2="-7"/>
    <line x1="0" y1="-5" x2="2.5" y2="-7"/>
    <line x1="0" y1="5" x2="-2.5" y2="7"/>
    <line x1="0" y1="5" x2="2.5" y2="7"/>
    <line x1="-4.5" y1="-2.6" x2="-5.8" y2="-0.6"/>
    <line x1="-4.5" y1="-2.6" x2="-2.9" y2="-4.4"/>
    <line x1="4.5" y1="2.6" x2="5.8" y2="0.6"/>
    <line x1="4.5" y1="2.6" x2="2.9" y2="4.4"/>
    <circle cx="0" cy="0" r="1" fill="#FFFFFF" stroke="none"/>
  </g>

  <!-- Stacked bars — right-aligned, compact, 0px gaps (touching) -->
  <rect x="52" y="28" width="36" height="9" rx="4.5" fill="#BAE6FD" opacity="0.5"/>
  <rect x="41" y="37" width="47" height="11" rx="6" fill="#7DD3FC" opacity="0.65"/>
  <rect x="31" y="48" width="57" height="12" rx="8" fill="#38BDF8" opacity="0.8"/>
  <rect x="20" y="60" width="68" height="14" rx="9" fill="#0EA5E9" opacity="0.9"/>
  <rect x="10" y="74" width="78" height="15" rx="11" fill="#0284C7"/>
</svg>
